/^(?P<name>[a-zA-Z][a-zA-Z0-9]*)=$/(exec): $name = $default

import(exec): |
  assert(type($default) )
  for key, value in $default.items():
    if type(value) == list:
      exec(f"from {key} import {value.join(', ')}")
    elif type(value) == None:
      exec(f"import {key}")
    elif type(value) == str:
      exec(f"import {key} as {value}")
    else:
      raise "Invalid value for import"
  
    
