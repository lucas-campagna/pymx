  matplotlib.pyplot: plt # import matplotlib.pyplot as plt
  pandas: pd # import pandas as pd
  numpy: null # import numpy
  sklearn.linear_model: [LinearRegression, LogRegression] # from sklearn.linear_model import LinearRegression, LogRegression


